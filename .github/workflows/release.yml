name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false

      matrix:
        include:

          # linux amd64
          - os: ubuntu-latest
            target: linux-amd64
            cc: gcc
            output: blob

          # linux arm64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            cc: gcc
            output: blob

          # windows amd64
          - os: windows-latest
            target: windows-amd64
            cc: gcc
            output: blob.exe

          # macos amd64
          - os: macos-latest
            target: macos-amd64
            cc: clang
            output: blob

          # macos arm64
          - os: macos-latest
            target: macos-arm64
            cc: clang
            output: blob

    runs-on: ${{ matrix.os }}

    steps:

      - name: checkout
        uses: actions/checkout@v4

      - name: build unix
        if: runner.os != 'Windows'
        shell: bash
        run: |

          # macos
          if [[ "${{ runner.os }}" == "macOS" ]]; then

            ${{ matrix.cc }} \
              -Os \
              -ffunction-sections \
              -fdata-sections \
              -dead_strip \
              main.c \
              -o ${{ matrix.output }}

            strip ${{ matrix.output }}

          # linux
          else

            ${{ matrix.cc }} \
              -Os \
              -s \
              -ffunction-sections \
              -fdata-sections \
              -Wl,--gc-sections \
              main.c \
              -o ${{ matrix.output }}

          fi

      # build windows
      - name: build windows
        if: runner.os == 'Windows'
        shell: bash
        run: |

          gcc \
            -Os \
            -s \
            -ffunction-sections \
            -fdata-sections \
            -Wl,--gc-sections \
            main.c \
            -o ${{ matrix.output }}

      # rename standalone binaries
      - name: rename binary
        shell: bash
        run: |

          mkdir -p release

          if [[ "${{ runner.os }}" == "Windows" ]]; then

            cp ${{ matrix.output }} \
              release/blob-${{ matrix.target }}.exe

          else

            cp ${{ matrix.output }} \
              release/blob-${{ matrix.target }}

            chmod +x \
              release/blob-${{ matrix.target }}

          fi

      # archives
      - name: create archives
        shell: bash
        run: |

          mkdir -p archive

          cp README.md archive/ || true
          cp LICENSE archive/ || true
          cp ${{ matrix.output }} archive/

          cd archive

          if [[ "${{ runner.os }}" == "Windows" ]]; then

            zip ../blob-${{ matrix.target }}.zip *

          else

            tar -czf ../blob-${{ matrix.target }}.tar.gz *

          fi

      # checksums
      - name: generate checksums
        shell: bash
        run: |

          touch SHA256SUMS

          for file in release/* *.zip *.tar.gz; do

            if [[ -f "$file" ]]; then

              if command -v sha256sum >/dev/null 2>&1; then
                sha256sum "$file" >> SHA256SUMS
              else
                shasum -a 256 "$file" >> SHA256SUMS
              fi

            fi

          done

            # publish github release
      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/*
            *.zip
            *.tar.gz
            SHA256SUMS
