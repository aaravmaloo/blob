name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  build:

    strategy:
      fail-fast: false

      matrix:
        include:

          - os: ubuntu-latest
            target: linux-amd64
            cc: gcc
            output: blob

          - os: ubuntu-24.04-arm
            target: linux-arm64
            cc: gcc
            output: blob

          - os: windows-latest
            target: windows-amd64
            cc: gcc
            output: blob.exe

          - os: macos-latest
            target: macos-amd64
            cc: clang
            output: blob

          - os: macos-latest
            target: macos-arm64
            cc: clang
            output: blob

    runs-on: ${{ matrix.os }}

    steps:

      - name: checkout
        uses: actions/checkout@v4

      # unix build
      - name: build unix
        if: runner.os != 'Windows'
        shell: bash
        run: |

          if [[ "${{ runner.os }}" == "macOS" ]]; then

            ${{ matrix.cc }} \
              -Os \
              -ffunction-sections \
              -fdata-sections \
              -dead_strip \
              main.c \
              -o ${{ matrix.output }}

            strip ${{ matrix.output }}

          else

            ${{ matrix.cc }} \
              -Os \
              -s \
              -ffunction-sections \
              -fdata-sections \
              -Wl,--gc-sections \
              main.c \
              -o ${{ matrix.output }}

          fi

      # windows build
      - name: build windows
        if: runner.os == 'Windows'
        shell: bash
        run: |

          gcc \
            -Os \
            -s \
            -ffunction-sections \
            -fdata-sections \
            -Wl,--gc-sections \
            main.c \
            -o ${{ matrix.output }}

      # package
      - name: package
        shell: bash
        run: |

          mkdir -p dist

          if [[ "${{ runner.os }}" == "Windows" ]]; then

            cp "${{ matrix.output }}" \
              "dist/blob-${{ matrix.target }}.exe"

            powershell Compress-Archive \
              -Path dist/* \
              -DestinationPath \
              "blob-${{ matrix.target }}.zip"

          else

            cp "${{ matrix.output }}" \
              "dist/blob-${{ matrix.target }}"

            chmod +x \
              "dist/blob-${{ matrix.target }}"

            tar -czf \
              "blob-${{ matrix.target }}.tar.gz" \
              dist/*

          fi

      # upload workflow artifacts
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*
            *.zip
            *.tar.gz

  release:

    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # checksums
      - name: generate checksums
        shell: bash
        run: |

          cd artifacts

          find . -type f | while read file; do
            sha256sum "$file"
          done > SHA256SUMS

      # publish release
      - name: publish github release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
